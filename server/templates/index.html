<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Cat Monitor Pro</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="dashboard">
        <header>
            <h1>🐾 Cat Detector <span id="live-badge" class="badge">Live</span></h1>
            
            <div class="status-bar">
                <div class="status-indicator">
                    <span class="label">Ostatnio zaobserwowano:</span>
                    <span id="last-seen" class="value">{{ last_seen }}</span>
                </div>

                <div class="battery-indicator">
                    <span class="label">Telefon:</span>
                    <div class="battery-container">
                        <div class="battery-shell">
                            <div id="battery-level-bar" class="battery-level-bar"></div>
                        </div>
                        <span id="battery-text" class="value">---</span>
                    </div>
                </div>
            </div>
        </header>

        <section class="controls">
            <div class="control-group">
                <label>Zoom: <span id="zoom-val">1.0</span>x</label>
                <input type="range" id="zoom-slider" min="1" max="3" step="0.1" value="1">
            </div>
            <button id="torch-btn" class="btn">Latarka: OFF</button>
        </section>

        <main class="viewport">
            <div class="stream-container">
                <img src="{{ url_for('video_feed') }}" alt="Stream" id="main-stream">
            </div>
        </main>

        <section class="archive">
            <div class="archive-box">
                <h3>📜 Dziennik aktywności</h3>
                <pre id="log-viewer">Ładowanie...</pre>
            </div>
            <div class="archive-box">
                <h3>📸 Ostatnie zdjęcia</h3>
                <div id="gallery" class="gallery-grid"></div>
            </div>
        </section>
    </div>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
